# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: ko

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false

  path_filters:
    - '!node_modules/**'
    - '!dist/**'
    - '!coverage/**'

  path_instructions:
    - path: 'src/**/*.{ts,tsx}'
      instructions: |
        다음 사용자 영향·보안·유지보수 문제만 지적한다.
        - 사용자 입력이나 API 응답을 dangerouslySetInnerHTML로 렌더링하지 않는다.
        - 로딩, 오류, 빈 상태가 사용자에게 필요한 화면에서 누락되지 않는지 확인한다.
        - label, 버튼 이름, 키보드 조작 등 기본 접근성을 훼손하지 않는다.
        - any, 타입 단언 남용, 비동기 작업의 취소·경쟁 조건을 지적한다.
        - JWT, OAuth token, 개인정보, 전체 사용자 원문을 console 또는 오류 메시지에 기록하지 않는다.

    - path: 'src/**/{api,auth}/**'
      instructions: |
        - 브라우저 API 요청은 동일 출처의 /api 경로를 사용한다. 별도 운영 API URL이나 비밀값을 VITE_ 환경변수에 추가하지 않는다.
        - HTTP 실패 응답을 성공으로 처리하거나 서버 내부 오류 내용을 그대로 노출하지 않는다.
        - 인증 정보는 요청·응답 로그나 URL query string에 넣지 않는다.

    - path: 'vite.config.ts'
      instructions: |
        - 개발 서버는 localhost:3000 계약을 유지하고 /api만 로컬 Spring Boot(8080)로 프록시한다.
        - 운영 API 경로나 인증 비밀값을 Vite 설정에 하드코딩하지 않는다.

    - path: '{Dockerfile,nginx/**}'
      instructions: |
        - 프로덕션 이미지는 정적 빌드 산출물만 제공하고 Node 개발 서버를 실행하지 않는다.
        - Nginx는 비루트 8080 포트와 SPA deep-link fallback을 유지한다.
        - /api 프록시는 외부 Nginx가 담당하므로 frontend 컨테이너에 별도 백엔드 upstream을 추가하지 않는다.

    - path: '{package.json,package-lock.json,.nvmrc,.github/workflows/**}'
      instructions: |
        - 새 의존성은 명확한 필요성과 기존 기능으로 대체할 수 없는 근거가 있을 때만 추가한다.
        - Node 버전은 .nvmrc를 기준으로 통일하고 CI는 npm ci, lint, build를 실행해야 한다.
        - 커밋 가능한 파일에 API Key, 비밀번호, 토큰을 추가하지 않는다.
