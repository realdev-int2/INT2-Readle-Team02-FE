name: Frontend CI

on:
  pull_request: {}
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  publish-image:
    needs: frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c66a8fcb2472d4283042d726b2a061b43b3f49ab
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name
        id: image
        shell: bash
        run: printf 'name=ghcr.io/%s\n' "${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@cb941d0b895b09c17fa011d41c411b33c752cf28
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:main
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy-frontend:
    needs: publish-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    concurrency:
      group: frontend-production
      cancel-in-progress: false
    permissions:
      contents: read
    env:
      IMAGE_DIGEST: ${{ needs.publish-image.outputs.digest }}
      EC2_HOST: ${{ vars.EC2_HOST }}
      EC2_USER: ${{ vars.EC2_USER }}
      EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
      EC2_KNOWN_HOSTS: ${{ secrets.EC2_KNOWN_HOSTS }}
    steps:
      - name: Deploy published digest
        shell: bash
        run: |
          set -euo pipefail

          key_file="$(mktemp)"
          known_hosts_file="$(mktemp)"
          trap 'rm -f "$key_file" "$known_hosts_file"' EXIT

          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > "$key_file"
          printf '%s\n' "$EC2_KNOWN_HOSTS" > "$known_hosts_file"
          chmod 600 "$key_file" "$known_hosts_file"

          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_ref="${image_name}@${IMAGE_DIGEST}"
          ssh -i "$key_file" \
            -o ConnectTimeout=15 \
            -o IdentitiesOnly=yes \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$known_hosts_file" \
            "$EC2_USER@$EC2_HOST" \
            "sudo /usr/local/libexec/readle-frontend/deploy-frontend $image_ref $GITHUB_SHA"
